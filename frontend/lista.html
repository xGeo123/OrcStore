<div class="bg-dark py-5 border-bottom border-secondary">
    <div class="container d-flex justify-content-between align-items-center flex-wrap gap-3">
        <div>
            <h1 class="display-4 fw-bold text-white text-uppercase mb-1">Catálogo <span class="text-danger">Orc</span></h1>
            <p class="text-secondary mb-0">El arsenal definitivo para tu setup profesional.</p>
        </div>
        <button class="btn btn-danger fw-bold px-4" onclick="abrirModalCrear()">+ Agregar Componente</button>
    </div>
</div>

<div class="container mt-5">
    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4" id="productos-grid">
    </div>
</div>

<div class="modal fade" id="modalComponente" tabindex="-1" aria-labelledby="modal-titulo" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content bg-dark text-white border-secondary">
            <div class="modal-header border-secondary">
                <h5 class="modal-title fw-bold" id="modal-titulo">Agregar Componente</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="form-componente">
                    <input type="hidden" id="componente-id">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label text-secondary small text-uppercase fw-bold">Nombre</label>
                            <input type="text" class="form-control bg-transparent text-white border-secondary" id="campo-nombre" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-secondary small text-uppercase fw-bold">Categoría</label>
                            <select class="form-select bg-dark text-white border-secondary" id="campo-categoria" required>
                                <option value="">Seleccionar...</option>
                                <option value="CPU">CPU</option>
                                <option value="GPU">GPU</option>
                                <option value="RAM">RAM</option>
                                <option value="Almacenamiento">Almacenamiento</option>
                                <option value="Placa Madre">Placa Madre</option>
                                <option value="Fuente de Poder">Fuente de Poder</option>
                                <option value="Refrigeración">Refrigeración</option>
                                <option value="Gabinete">Gabinete</option>
                                <option value="Monitor">Monitor</option>
                                <option value="Otro">Otro</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-secondary small text-uppercase fw-bold">Precio (USD)</label>
                            <input type="number" class="form-control bg-transparent text-white border-secondary" id="campo-precio" min="0" step="0.01" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-secondary small text-uppercase fw-bold">Stock</label>
                            <input type="number" class="form-control bg-transparent text-white border-secondary" id="campo-stock" min="0" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label text-secondary small text-uppercase fw-bold">URL de Imagen</label>
                            <input type="url" class="form-control bg-transparent text-white border-secondary" id="campo-imagen" placeholder="https://...">
                        </div>
                        <div class="col-12">
                            <label class="form-label text-secondary small text-uppercase fw-bold">Descripción</label>
                            <textarea class="form-control bg-transparent text-white border-secondary" id="campo-descripcion" rows="3" required></textarea>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-secondary">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-danger fw-bold px-4" id="btn-guardar" onclick="guardarComponente()">Guardar</button>
            </div>
        </div>
    </div>
</div>
